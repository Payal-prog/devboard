# Goal - to run the end to end DevSecOps CI Pipeline
name: DevSecOps Practice
on:
    push:
        branches: [master]

jobs:
    # The different workflows below will run in parallel, and each workflow will have its own set of jobs. 
    # The jobs within a workflow will also run in parallel, unless you specify dependencies between them.
    code-quality:
        uses: ./.github/workflows/code-quality.yml # uses - The location and version of a reusable workflow file to run as a job.

    secret-scanning:
        uses: ./.github/workflows/secret-scanning.yml

    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml

    docker-scans:
        uses: ./.github/workflows/docker-scans.yml
        secrets: inherit   
        
    sonar-qube:
        uses: ./.github/workflows/sonar-scan.yml
        secrets: inherit   
    
    code-tests:
        uses: ./.github/workflows/code-tests.yml
    
    docker-push:
        uses: ./.github/workflows/docker-push-practice.yml
        needs: [code-quality, secret-scanning, dependency-scan, docker-scans, sonar-qube, code-tests]
        secrets: inherit
