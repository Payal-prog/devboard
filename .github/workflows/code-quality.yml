# Goal - I have to do SAST for my Code

name: Code Quality

on:
    workflow_call:                                                  # used to indicate that a workflow can be called by another workflow.

jobs:
    sast:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7
            
            - name: Setup NodeJs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json
            
            - name: Install npm Packages
              run: npm install 
              working-directory: frontend

            - name: Run Linter
              run: npm run lint               # npm run lint is a command that runs the 'linter script' defined in the package.json file of a Node.js project. The linter checks the code for potential errors, coding style issues, and other problems based on predefined rules.
              working-directory: frontend

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: '1.23'
                go-version-file: 'go.mod'
                cache-dependency-path: go.sum
            
            - name: Run Go Formatter
              run: go fmt
              working-directory: backend

            - name: Run Go Vet
              run: go vet
              working-directory: backend