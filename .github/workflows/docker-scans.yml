# Goal - Ensure the docker files and Docker images are security Tested

name: Docker scan

on: 
  workflow_call:

jobs:
  dockerfile-lint-and-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folders: ['backend', 'frontend']  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

                                                # The below steps lints the docker files and scans the docker images for vulnerabilities.
      - name: Lint Dockerfile using Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:                                   # 'With parameters' are used to pass inputs to the action. In this case, we are specifying the path to the Dockerfile that we want to lint.
          dockerfile: ./${{ matrix.folders }}/Dockerfile
       
      # - name: Docker Scan
      #   uses: docker/scan-action@v2

