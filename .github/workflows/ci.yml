name: CI

on: 
  push:
    branches: [master]

jobs:
  code-lint:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v7
       
  build-and-push:
    needs: [code-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
         username: ${{ secrets.DOCKERHUB_USERNAME }} 
         password: ${{ secrets.DOCKERHUB_TOKEN }} 
         registry: docker.io
        
