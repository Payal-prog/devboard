# Goal:  Lint, Build, Test the code for Frontend & Backend and push the images to DockerHub.

name: CI-PushToDockerHub

on:
    workflow_call:                                                # This event allows you to manually trigger the workflow from the GitHub Actions tab in your repository. It is useful for testing and debugging workflows without needing to push code changes.
    # push:
    #   paths:
    #   - '**'
    #   - '!.github/workflows/**'
    #   branches: [master]

jobs: 
    build-push:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix:
            folders: ['frontend', 'backend']
        steps:
            - name: Checkout Code                                   # Both frontend and backend code will be checked out in this step
              uses: actions/checkout@v7

            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Docker Build and Push - frontend and backend
              uses: docker/build-push-action@v7
              with:
                context: ./${{ matrix.folders}}                  # Build's context is the set of files located in the specified PATH or URL
                push: true
                tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folders}} :latest   

         